<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北京高一物理上册 · 精华交互学习站</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">φ</div>
        <div>
          <h1>高一物理上册</h1>
          <p>北京课标 · 精华交互学</p>
        </div>
      </div>

      <div class="progress-box">
        <div class="progress-label">
          <span>学习进度</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-foot">
        <button class="btn-ghost" id="btnReset">重置进度</button>
        <button class="btn-ghost" id="btnDark">切换主题</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="菜单">☰</button>
        <div class="crumb" id="crumb">首页</div>
        <div class="top-actions">
          <span class="badge" id="scoreBadge">测验得分 —</span>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
